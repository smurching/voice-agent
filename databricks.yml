bundle:
  name: agent_customer_support

resources:
  # MLflow experiment for agent tracing - automatically created by bundle
  experiments:
    agent_customer_support_experiment:
      name: /Users/${workspace.current_user.userName}/${bundle.name}-${bundle.target}

  apps:
    agent_customer_support:
      name: "agent-customer-support"
      description: "Customer support voice agent"
      source_code_path: ./

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "${resources.experiments.agent_customer_support_experiment.id}"
            permission: 'CAN_MANAGE'
        - name: 'openai-api-key'
          secret:
            scope: 'smurching'
            key: 'openai-api-key'
            permission: 'READ'

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://e2-dogfood.staging.cloud.databricks.com
      profile: dogfood

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme Corp Voice Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 8px; }
    p.subtitle { color: #666; margin-bottom: 32px; }
    .controls { display: flex; gap: 12px; margin-bottom: 32px; }
    button {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #connectBtn { background: #2563eb; color: #fff; }
    #disconnectBtn { background: #dc2626; color: #fff; }
    #status {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 24px;
      min-height: 1.2em;
    }
    #transcript {
      width: 100%;
      max-width: 640px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      min-height: 200px;
      max-height: 480px;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #1a1a1a;
      white-space: pre-wrap;
    }
    .label { font-weight: 600; color: #2563eb; }
  </style>
</head>
<body>
  <h1>Acme Corp Voice Support</h1>
  <p class="subtitle">Speak with our AI customer support agent.</p>
  <div class="controls">
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
  </div>
  <div id="status">Not connected.</div>
  <div id="transcript"><span style="color:#aaa">Transcript will appear here...</span></div>

  <script>
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');

    let ws = null;
    let audioContext = null;
    let mediaStream = null;
    let scriptProcessor = null;
    let nextPlayTime = 0;
    let activeSources = [];   // AudioBufferSourceNodes currently scheduled/playing
    let interrupted = false;  // true while user is speaking; drops incoming audio deltas
    let agentTranscript = '';
    let transcriptCleared = false;

    const SAMPLE_RATE = 16000;
    const PLAYBACK_SAMPLE_RATE = 24000; // OpenAI outputs 24kHz

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function appendTranscript(delta) {
      if (!transcriptCleared) {
        transcriptEl.innerHTML = '';
        transcriptCleared = true;
      }
      agentTranscript += delta;
      transcriptEl.textContent = agentTranscript;
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    function resetTranscript() {
      agentTranscript = '';
      transcriptCleared = true;
      transcriptEl.textContent = '';
    }

    // Float32 samples [-1,1] -> Int16 PCM -> base64
    function float32ToBase64Pcm16(float32Array) {
      const int16 = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      const bytes = new Uint8Array(int16.buffer);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    // base64 PCM16 -> Float32 for Web Audio playback
    function base64Pcm16ToFloat32(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const int16 = new Int16Array(bytes.buffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
      return float32;
    }

    function stopAllAudio() {
      activeSources.forEach(s => { try { s.stop(); } catch (_) {} });
      activeSources = [];
      nextPlayTime = 0;
    }

    function scheduleAudioChunk(float32Samples) {
      if (!audioContext || interrupted) return;
      const buffer = audioContext.createBuffer(1, float32Samples.length, PLAYBACK_SAMPLE_RATE);
      buffer.copyToChannel(float32Samples, 0);
      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(audioContext.destination);
      const now = audioContext.currentTime;
      const startAt = Math.max(now, nextPlayTime);
      source.start(startAt);
      nextPlayTime = startAt + buffer.duration;
      activeSources.push(source);
      source.onended = () => {
        activeSources = activeSources.filter(s => s !== source);
      };
    }

    async function connect() {
      setStatus('Requesting microphone access...');
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        setStatus('Microphone access denied: ' + e.message);
        return;
      }

      audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
      nextPlayTime = 0;
      activeSources = [];
      interrupted = false;

      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws/voice`);

      ws.onopen = () => {
        setStatus('Connected. Speak now...');
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        startCapture();
      };

      ws.onmessage = (evt) => {
        let event;
        try { event = JSON.parse(evt.data); } catch { return; }
        handleServerEvent(event);
      };

      ws.onclose = () => {
        setStatus('Disconnected.');
        cleanup();
      };

      ws.onerror = (e) => {
        setStatus('WebSocket error. Check server logs.');
        cleanup();
      };
    }

    function startCapture() {
      const source = audioContext.createMediaStreamSource(mediaStream);
      // 4096 samples at 16kHz = 256ms chunks
      scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
      scriptProcessor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const samples = e.inputBuffer.getChannelData(0);
        const b64 = float32ToBase64Pcm16(samples);
        ws.send(JSON.stringify({ type: 'input_audio_buffer.append', audio: b64 }));
      };
      source.connect(scriptProcessor);
      scriptProcessor.connect(audioContext.destination);
    }

    function handleServerEvent(event) {
      switch (event.type) {
        case 'response.audio.delta':
          if (event.delta) {
            const samples = base64Pcm16ToFloat32(event.delta);
            // Resume AudioContext if suspended (browser autoplay policy)
            if (audioContext && audioContext.sampleRate !== PLAYBACK_SAMPLE_RATE) {
              // Create a new AudioContext for playback at correct sample rate if needed
            }
            scheduleAudioChunk(samples);
          }
          break;

        case 'response.audio_transcript.delta':
          if (event.delta) appendTranscript(event.delta);
          break;

        case 'response.audio_transcript.done':
          appendTranscript('\n');
          break;

        case 'response.created':
          interrupted = false;
          break;

        case 'response.done':
          setStatus('Agent finished speaking. Speak to continue...');
          break;

        case 'response.cancelled':
          stopAllAudio();
          break;

        case 'input_audio_buffer.speech_started':
          interrupted = true;
          stopAllAudio();
          resetTranscript();
          setStatus('Listening...');
          break;

        case 'error':
          setStatus('Error: ' + (event.error?.message || JSON.stringify(event.error)));
          break;
      }
    }

    function cleanup() {
      connectBtn.disabled = false;
      disconnectBtn.disabled = true;
      stopAllAudio();
      if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      ws = null;
      interrupted = false;
    }

    function disconnect() {
      if (ws) ws.close();
      cleanup();
      setStatus('Disconnected.');
    }

    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
  </script>
</body>
</html>
